<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Esja Trailhead Basecamp</title>
  <desc id="desc">Outdoor venue cover for Esja Trailhead in Reykjavik</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D5F3A" />
      <stop offset="45%" stop-color="#7C9A82" />
      <stop offset="100%" stop-color="#F5F0E8" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="26" />
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)" />
  <circle cx="1280" cy="180" r="180" fill="rgba(255,255,255,0.12)" filter="url(#blur)" />
  <circle cx="260" cy="700" r="230" fill="rgba(245,240,232,0.18)" filter="url(#blur)" />
  <circle cx="900" cy="400" r="300" fill="rgba(124,154,130,0.2)" filter="url(#blur)" />
  <!-- Mountain silhouette -->
  <path d="M0 600 L300 280 L500 380 L700 200 L900 320 L1100 180 L1300 350 L1600 260 L1600 900 L0 900Z" fill="rgba(45,95,58,0.3)" />
  <path d="M0 700 L200 450 L400 520 L600 380 L800 480 L1000 340 L1200 420 L1400 300 L1600 400 L1600 900 L0 900Z" fill="rgba(45,95,58,0.2)" />
  <rect x="110" y="110" width="200" height="52" rx="26" fill="#D1FAE5" />
  <text x="210" y="143" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-size="22" font-weight="700" fill="#065F46" letter-spacing="1.4">Outdoors</text>
  <text x="110" y="640" font-family="Fraunces, Georgia, serif" font-size="96" font-weight="600" fill="#FFFFFF" letter-spacing="-3">Esja Trailhead</text>
  <text x="110" y="714" font-family="DM Sans, Arial, sans-serif" font-size="30" fill="rgba(255,255,255,0.82)">Outdoor Venue · Mosfellsbaer</text>
  <text x="110" y="796" font-family="DM Sans, Arial, sans-serif" font-size="22" fill="#A7F3D0" letter-spacing="1.8">MEETUP REYKJAVIK VENUE SOURCEBOOK</text>
</svg>